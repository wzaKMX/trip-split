name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Имя репозитория для basePath на GitHub Pages.
      PAGES_BASE_PATH: /trip-split
      # Публичные ключи Supabase (publishable-ключ безопасен в клиенте; защита — RLS).
      NEXT_PUBLIC_SUPABASE_URL: https://wqvkctwkioxvbrcxpyvm.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_o3AjEDgsrJElWwC4KoGXUw_rp-Xsukl
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
